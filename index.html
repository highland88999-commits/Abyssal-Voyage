<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Omni-Voyage: Tactical Apex</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.95); color: #fff; transition: opacity 0.5s;
        }
        #ui-panel {
            position: absolute; top: 20px; right: 20px; color: #00f2ff; 
            background: rgba(0,10,20,0.8); padding: 15px; border: 1px solid #00f2ff;
            border-radius: 8px; pointer-events: none; text-align: right; z-index: 100;
        }
        button { 
            padding: 15px 30px; font-size: 16px; cursor: pointer; 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1px solid #00f2ff; 
            font-weight: bold; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #00f2ff;">TACTICAL VOYAGE</h1>
        <p>Tilt Phone to Steer | Pinch to Zoom</p>
        <button id="startBtn">ENGAGE MISSION</button>
        <input type="file" id="audioUpload" accept="audio/*" style="display: none;">
    </div>

    <div id="ui-panel">
        <div id="clock">TIME: --:--</div>
        <div id="speed">WARP: 1x</div>
        <div id="tilt">STEER: 0°</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, analyzer, dataArray;
        let balloonGroup, camoMat, grassField, starField;
        let targetX = 0, currentX = 0, zoomTarget = 40;
        let lastTap = 0, speedMultiplier = 1.0;

        async function init() {
            // Request permissions for motion on iOS
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                await DeviceOrientationEvent.requestPermission();
            }
            
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);
            dataArray = new Uint8Array(analyzer.frequencyBinCount);

            document.getElementById('overlay').style.display = 'none';
            setupScene();
        }

        function setupScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.01);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.8, 0.4, 0.85);
            composer.addPass(bloom);

            // --- Camo Balloon (Tactical Cloth) ---
            const camoCanvas = document.createElement('canvas');
            camoCanvas.width = camoCanvas.height = 256;
            const ctx = camoCanvas.getContext('2d');
            ctx.fillStyle = '#2d3e26'; // Dark Olive
            ctx.fillRect(0,0,256,256);
            for(let i=0; i<100; i++) {
                ctx.fillStyle = ['#1a2416', '#4b5332', '#6b734d'][Math.floor(Math.random()*3)];
                ctx.beginPath();
                ctx.arc(Math.random()*256, Math.random()*256, 10+Math.random()*30, 0, Math.PI*2);
                ctx.fill();
            }
            const camoTex = new THREE.CanvasTexture(camoCanvas);
            camoTex.wrapS = camoTex.wrapT = THREE.RepeatWrapping;

            balloonGroup = new THREE.Group();
            camoMat = new THREE.MeshStandardMaterial({ map: camoTex, roughness: 1 });
            const envelope = new THREE.Mesh(new THREE.IcosahedronGeometry(5, 3), camoMat);
            envelope.scale.set(1, 1.4, 1);
            balloonGroup.add(envelope);
            
            const cap = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
            cap.position.y = -6.5;
            balloonGroup.add(cap);
            scene.add(balloonGroup);

            // Grass & Environment
            grassField = new THREE.Mesh(new THREE.PlaneGeometry(300, 500, 50, 50), new THREE.MeshStandardMaterial({ color: 0x112211, wireframe: true }));
            grassField.rotation.x = -Math.PI / 2;
            scene.add(grassField);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 20, 10);
            scene.add(sun);

            // Event Listeners
            window.addEventListener('deviceorientation', (e) => {
                targetX = e.gamma * 0.8; // Map tilt to range
                document.getElementById('tilt').innerText = `STEER: ${Math.round(e.gamma)}°`;
            });

            window.addEventListener('wheel', (e) => {
                zoomTarget += e.deltaY * 0.05;
                zoomTarget = Math.max(15, Math.min(80, zoomTarget));
            });

            window.addEventListener('touchstart', handleDoubleTap);
            
            animate();
        }

        function handleDoubleTap(e) {
            const now = Date.now();
            if (now - lastTap < 300) {
                speedMultiplier = (speedMultiplier >= 5) ? 1.0 : speedMultiplier + 1.0;
                document.getElementById('speed').innerText = `WARP: ${speedMultiplier}x`;
            }
            lastTap = now;
        }

        function animate() {
            requestAnimationFrame(animate);
            analyzer.getByteFrequencyData(dataArray);
            const bass = dataArray[2] / 255;

            // Smooth Steering
            currentX += (targetX - currentX) * 0.1;
            balloonGroup.position.x = currentX;
            balloonGroup.rotation.z = -currentX * 0.05; // Lean into turns

            // Smooth Zoom
            camera.position.z += (zoomTarget - camera.position.z) * 0.1;

            // Movement
            const speed = (1 + bass * 3) * speedMultiplier;
            grassField.position.z += speed;
            if(grassField.position.z > 100) grassField.position.z = 0;

            // Audio Flare
            camoMat.emissive = new THREE.Color(0x00f2ff).multiplyScalar(bass * 0.5);

            composer.render();
        }

        document.getElementById('startBtn').addEventListener('click', init);
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
