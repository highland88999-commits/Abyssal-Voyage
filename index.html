<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Voyage: Starfield Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.95); transition: opacity 0.5s ease;
        }
        #startBtn { 
            padding: 20px 50px; font-size: 24px; cursor: pointer; 
            background: transparent; color: #ff8800; border: 2px solid #ff8800;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }
        #startBtn:hover { background: #ff8800; color: black; box-shadow: 0 0 30px #ff8800; }
        #controls {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            color: #ff8800; background: rgba(0,0,0,0.7); padding: 15px; border: 1px solid #ff8800;
            border-radius: 8px;
        }
        button.shift-btn { background: #00f2ff; border: none; color: black; padding: 8px 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #ff8800; letter-spacing: 5px;">OMNI-VOYAGE</h1>
        <button id="startBtn">ENGAGE ENGINES</button>
    </div>

    <div id="controls">
        SECTOR: <span id="dimLabel">CYBER-CANYON</span><br><br>
        <button class="shift-btn" id="shiftBtn">DIMENSIONAL JUMP</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';
        import { GlitchPass } from 'three/examples/jsm/postprocessing/GlitchPass.js';

        let scene, camera, renderer, composer, bloomPass, glitchPass;
        let analyzer, dataArray;
        let walls = [], balloonGroup, hoodieMat, neonMat, starField, starsGeo;
        let currentDim = 'CYBERPUNK';
        let starPositions = [];

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);
            dataArray = new Uint8Array(analyzer.frequencyBinCount);

            document.getElementById('overlay').style.display = 'none';

            // --- Scene Core ---
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a0800, 0.015);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- Starfield System ---
            const starCount = 1500;
            starsGeo = new THREE.BufferGeometry();
            const positions = new Float32Array(starCount * 3);
            for (let i = 0; i < starCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 200;
                positions[i*3+1] = (Math.random() - 0.5) * 200;
                positions[i*3+2] = Math.random() * -500;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true, opacity: 0.8 });
            starField = new THREE.Points(starsGeo, starMat);
            scene.add(starField);

            // --- Post Processing ---
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloomPass);
            glitchPass = new GlitchPass();
            glitchPass.enabled = false;
            composer.addPass(glitchPass);

            // --- Lighting ---
            const sun = new THREE.PointLight(0xffaa66, 2, 100);
            sun.position.set(0, 20, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x201005, 0.3));

            // --- World Geometry ---
            const wallGeo = new THREE.PlaneGeometry(150, 100, 20, 20);
            const wallMat = new THREE.MeshStandardMaterial({ color: 0x442211, flatShading: true, roughness: 0.8 });
            
            for (let i = 0; i < 5; i++) {
                let left = new THREE.Mesh(wallGeo, wallMat);
                left.rotation.y = Math.PI / 2;
                left.position.set(-40, 20, -i * 100);
                scene.add(left);
                
                let right = new THREE.Mesh(wallGeo, wallMat);
                right.rotation.y = -Math.PI / 2;
                right.position.set(40, 20, -i * 100);
                scene.add(right);
                walls.push({ left, right, z: -i * 100 });
            }

            // --- The Captain ---
            balloonGroup = new THREE.Group();
            neonMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2, wireframe: true });
            const envelope = new THREE.Mesh(new THREE.IcosahedronGeometry(5, 1), neonMat);
            envelope.scale.set(1, 1.4, 1);
            balloonGroup.add(envelope);

            hoodieMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 3 });
            const captain = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), hoodieMat);
            captain.position.y = -6.5;
            balloonGroup.add(captain);
            scene.add(balloonGroup);

            animate();
        }

        function jumpReality() {
            glitchPass.enabled = true;
            setTimeout(() => {
                currentDim = (currentDim === 'CYBERPUNK') ? 'ABYSSAL' : 'CYBERPUNK';
                document.getElementById('dimLabel').innerText = (currentDim === 'CYBERPUNK') ? 'CYBER-CANYON' : 'DEEP-ABYSS';
                
                if(currentDim === 'ABYSSAL') {
                    scene.fog.color.setHex(0x000510);
                    neonMat.color.setHex(0xff00ff);
                    neonMat.emissive.setHex(0xff00ff);
                    starField.material.color.setHex(0x00f2ff);
                } else {
                    scene.fog.color.setHex(0x1a0800);
                    neonMat.color.setHex(0x00ffff);
                    neonMat.emissive.setHex(0x00ffff);
                    starField.material.color.setHex(0xffffff);
                }
                glitchPass.enabled = false;
            }, 800);
        }

        function animate() {
            requestAnimationFrame(animate);
            analyzer.getByteFrequencyData(dataArray);
            
            // Extract bands
            const bass = dataArray[2] / 255;
            const mid = dataArray[15] / 255;

            // 1. Move Walls
            walls.forEach(seg => {
                seg.z += 1.5 + (bass * 2); // Speed up on bass
                if (seg.z > 100) seg.z = -400;
                seg.left.position.z = seg.z;
                seg.right.position.z = seg.z;
                // Wall shake
                seg.left.position.x = -40 + (bass * 8);
                seg.right.position.x = 40 - (bass * 8);
            });

            // 2. Starfield Warp
            const posAttr = starsGeo.attributes.position;
            for (let i = 0; i < posAttr.count; i++) {
                let z = posAttr.getZ(i);
                z += 2 + (bass * 15); // STARS FLY FAST
                if (z > 50) z = -500;
                posAttr.setZ(i, z);
            }
            posAttr.needsUpdate = true;

            // 3. Captain Reactivity
            bloomPass.strength = 1.0 + (bass * 2.5);
            hoodieMat.emissiveIntensity = 3 + (mid * 10);
            balloonGroup.position.y = 6 + Math.sin(Date.now() * 0.003) * 1.5;
            balloonGroup.rotation.z = Math.sin(Date.now() * 0.001) * 0.1;

            composer.render();
        }

        document.getElementById('startBtn').addEventListener('click', init);
        document.getElementById('shiftBtn').addEventListener('click', jumpReality);
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
