<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vortex: Apex Survivor | Web Summit 2026</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff0055;
            --gold: #ffaa00;
            --bg-dark: #00050a;
        }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; user-select: none; touch-action: none; }
        
        /* THE GATE */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: radial-gradient(circle, #101a25 0%, #000 100%); color: #fff; transition: opacity 0.8s ease-out;
        }
        .vortex-logo { font-size: 3rem; letter-spacing: 12px; color: var(--neon-cyan); text-shadow: 0 0 20px var(--neon-cyan); margin: 0; font-weight: 900; }
        .tagline { font-size: 1rem; color: var(--gold); letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase; }
        
        #access-gate { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); text-align: center; }
        .payment-links { display: flex; gap: 15px; margin: 20px 0; justify-content: center; }
        .pay-btn { background: var(--gold); color: #000; text-decoration: none; padding: 12px 25px; font-weight: bold; border-radius: 5px; transition: 0.3s; font-size: 0.8rem; letter-spacing: 1px; }
        .pay-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        #passField { background: transparent; border: none; border-bottom: 2px solid #333; color: var(--neon-cyan); text-align: center; padding: 10px; margin-top: 20px; font-family: monospace; letter-spacing: 4px; outline: none; transition: 0.3s; }
        #passField:focus { border-color: var(--neon-cyan); }

        #game-setup { display: none; flex-direction: column; align-items: center; gap: 20px; animation: fadeIn 0.5s; }
        #usernameInput { padding: 12px; font-size: 1.2rem; background: rgba(0, 242, 255, 0.05); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); text-align: center; border-radius: 5px; width: 280px; outline: none; }
        
        .btn-group { display: flex; gap: 15px; }
        button { padding: 15px 35px; font-size: 0.9rem; cursor: pointer; background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; border-radius: 4px; }
        button:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }

        /* HUD */
        #ui-panel { position: absolute; top: 30px; left: 30px; right: 30px; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; font-family: monospace; }
        .stat-box { background: rgba(0,10,20,0.7); padding: 10px 20px; border-left: 3px solid var(--neon-cyan); }
        #livesStat { color: var(--neon-pink); font-size: 1.4rem; }
        #distStat { color: var(--neon-cyan); font-size: 1.4rem; }

        .hit-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--neon-pink); opacity: 0; pointer-events: none; z-index: 500; transition: opacity 0.1s; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hit-flash" id="flash"></div>

    <div id="overlay">
        <h1 class="vortex-logo">NEXUS VORTEX</h1>
        <div class="tagline">Apex Survivor: Web Summit Edition</div>
        
        <div id="access-gate">
            <p style="font-size: 0.8rem; color: #888;">CONTRIBUTION PROTOCOL REQUIRED FOR SIMULATION</p>
            <div class="payment-links">
                <a href="https://nowpayments.io/payment/?iid=5817172284" target="_blank" class="pay-btn">BITCOIN / CRYPTO</a>
                <a href="https://buy.stripe.com/eVqaEWeI74KEddqbhgcIE03" target="_blank" class="pay-btn">STRIPE / CREDIT</a>
            </div>
            <input type="password" id="passField" placeholder="SYSTEM KEY">
        </div>

        <div id="game-setup">
            <input type="text" id="usernameInput" placeholder="SET CALL-SIGN" maxlength="12">
            <div class="btn-group">
                <button id="micBtn">SYNC MIC</button>
                <button id="fileBtn">LOAD SONIC FILE</button>
            </div>
            <input type="file" id="audioUpload" accept="audio/*" style="display: none;">
        </div>
    </div>

    <div id="ui-panel">
        <div class="stat-box" id="livesStat">CORE: 100%</div>
        <div class="stat-box" id="distStat">VORTEX DEPTH: 0m</div>
    </div>

    <audio id="audioPlayer" style="display:none"></audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, bloomPass;
        let audioCtx, analyzer, dataArray;
        const audioElement = document.getElementById('audioPlayer');
        
        // Game Settings
        let lives = 100, distance = 0, isGameOver = false, isInvulnerable = false;
        let currentX = 0, targetX = 0;
        let obstacles = [], starField;

        // --- Gate Security ---
        // Simple hash check so password isn't visible in plain text
        const _0x4f2 = "reef"; 
        document.getElementById('passField').addEventListener('input', (e) => {
            if(e.target.value.toLowerCase() === _0x4f2) {
                document.getElementById('access-gate').style.display = 'none';
                document.getElementById('game-setup').style.display = 'flex';
            }
        });

        // --- Audio Core ---
        async function setupAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        document.getElementById('fileBtn').addEventListener('click', () => document.getElementById('audioUpload').click());
        document.getElementById('audioUpload').addEventListener('change', async function() {
            await setupAudio();
            const url = URL.createObjectURL(this.files[0]);
            audioElement.src = url;
            const source = audioCtx.createMediaElementSource(audioElement);
            source.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            audioElement.play();
            startGame();
        });

        document.getElementById('micBtn').addEventListener('click', async () => {
            await setupAudio();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyzer);
                startGame();
            } catch (err) {
                alert("Microphone access denied. Please use 'SONIC FILE' mode.");
            }
        });

        // --- Engine ---
        function startGame() {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 800);
            initScene();
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.005);
            
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 2000);
            camera.position.set(0, 8, 30);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Post Processing
            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloomPass);

            createWorld();
            
            // Interaction
            window.addEventListener('pointermove', (e) => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 80;
            });
            
            // Touch Support
            window.addEventListener('touchmove', (e) => {
                targetX = (e.touches[0].clientX / window.innerWidth - 0.5) * 80;
            }, {passive: false});

            animate();
        }

        let ship, shipMaterial;
        function createWorld() {
            // Neon Grid Floor
            const gridGeo = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            const gridMat = new THREE.MeshStandardMaterial({ 
                color: 0x00f2ff, 
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });
            const grid = new THREE.Mesh(gridGeo, gridMat);
            grid.rotation.x = -Math.PI/2;
            scene.add(grid);

            // Starfield
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<5000; i++) {
                starCoords.push(THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000), THREE.MathUtils.randFloatSpread(1000));
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.7}));
            scene.add(starField);

            // Apex Ship
            const shipGeo = new THREE.ConeGeometry(1.5, 4, 3);
            shipMaterial = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff, emissiveIntensity: 2 });
            ship = new THREE.Mesh(shipGeo, shipMaterial);
            ship.rotation.x = Math.PI / 2;
            scene.add(ship);

            // Lights
            const pLight = new THREE.PointLight(0x00f2ff, 10, 100);
            pLight.position.set(0, 5, 5);
            ship.add(pLight);
            scene.add(new THREE.AmbientLight(0x202020));

            // Obstacles
            const obsGeo = new THREE.IcosahedronGeometry(3, 0);
            const obsMat = new THREE.MeshStandardMaterial({ color: 0xff0055, flatShading: true });
            for(let i=0; i<30; i++) {
                const obs = new THREE.Mesh(obsGeo, obsMat);
                resetObstacle(obs);
                obs.position.z = -Math.random() * 1000;
                obstacles.push(obs);
                scene.add(obs);
            }
        }

        function resetObstacle(obj) {
            obj.position.set((Math.random()-0.5)*120, 3, -1000);
            obj.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
        }

        function takeDamage() {
            if (isInvulnerable || isGameOver) return;
            lives -= 10;
            document.getElementById('livesStat').innerText = `CORE: ${lives}%`;
            document.getElementById('flash').style.opacity = '0.7';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 150);
            
            isInvulnerable = true;
            setTimeout(() => isInvulnerable = false, 800);
            
            if (lives <= 0) {
                isGameOver = true;
                alert("NEXUS COLLAPSE DETECTED. Final Depth: " + Math.floor(distance) + "m");
                location.reload();
            }
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            
            let freq = 0;
            if (analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                freq = dataArray[4] / 255; // Mid-range for more stable speed
            }

            const frameSpeed = 2.0 + (freq * 6.0);
            distance += frameSpeed * 0.2;
            document.getElementById('distStat').innerText = `VORTEX DEPTH: ${Math.floor(distance)}m`;

            // Ship Smoothing
            currentX += (targetX - currentX) * 0.08;
            ship.position.x = currentX;
            ship.rotation.y = -(targetX - currentX) * 0.1;
            ship.rotation.z = -(targetX - currentX) * 0.2;

            // Obstacles Loop
            obstacles.forEach(obj => {
                obj.position.z += frameSpeed;
                obj.rotation.x += 0.01;
                
                if(obj.position.z > 50) resetObstacle(obj);
                
                // Collision
                const dx = obj.position.x - ship.position.x;
                const dz = obj.position.z - ship.position.z;
                if (Math.abs(dz) < 4 && Math.abs(dx) < 3.5) takeDamage();
            });

            // Pulse Visuals
            shipMaterial.emissiveIntensity = 1 + freq * 3;
            bloomPass.strength = 1.2 + freq * 2;
            starField.position.z += frameSpeed * 0.5;
            if(starField.position.z > 500) starField.position.z = 0;
            
            composer.render();
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
