<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vortex: Apex Voyage</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.95); color: #fff; transition: opacity 0.5s;
        }
        h1 { letter-spacing: 5px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; text-align: center; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        button { 
            padding: 15px 30px; font-size: 16px; cursor: pointer; 
            background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1px solid #00f2ff; 
            font-weight: bold; transition: 0.3s; text-transform: uppercase;
        }
        button:hover { background: #00f2ff; color: #000; box-shadow: 0 0 15px #00f2ff; }

        #ui-panel {
            position: absolute; top: 20px; right: 20px; color: #00f2ff; 
            background: rgba(0,10,20,0.8); padding: 15px; border: 1px solid #00f2ff;
            border-radius: 8px; pointer-events: none; text-align: right; z-index: 100;
            text-shadow: 0 0 5px #00f2ff; line-height: 1.5;
        }
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        #audioControls { display: none; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #00f2ff; border-radius: 8px; }
        audio { outline: none; filter: invert(100%) hue-rotate(180deg); }
        
        .hit-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; transition: opacity 0.1s; z-index: 500; }
    </style>
</head>
<body>

    <div class="hit-flash" id="flash"></div>

    <div id="overlay">
        <h1>NEXUS VOYAGE<br><span style="font-size: 0.5em; color: #ffaa00;">APEX TACTICAL</span></h1>
        <p style="color: #aaa; text-align: center;">Tilt Phone to Steer | Pinch to Zoom<br>Dodge Rocks & Crows</p>
        <div class="btn-group">
            <button id="micBtn">INIT: MIC</button>
            <button id="fileBtn">INIT: LOCAL MP3</button>
        </div>
        <input type="file" id="audioUpload" accept="audio/*" style="display: none;">
    </div>

    <div id="ui-panel">
        <div id="clock">TIME: --:--</div>
        <div id="eventDisplay" style="color: #ffaa00;">EVENT: CLEAR</div>
        <div id="sector">SECTOR: OVERWORLD</div>
        <div id="tilt">STEER: 0°</div>
    </div>

    <div id="controls">
        <button id="shiftBtn" style="background: #ffaa00; color: #000; border-color: #ffaa00;">DIMENSION SHIFT</button>
        <button id="skipBtn" style="background: #ff00ff; color: #000; border-color: #ff00ff;">>> FF EVENT</button>
        <div id="audioControls"><audio id="audioPlayer" controls></audio></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        // Core
        let scene, camera, renderer, composer, bloomPass;
        let audioCtx, analyzer, dataArray, mediaSource;
        const audioElement = document.getElementById('audioPlayer');
        
        // World Objects
        let balloonGroup, camoMat, grassField, sun, distantCity, floodPlane;
        let rain, hail, meteors, scarabs, tracks, trainGroup;
        let obstacles = [], crows = [];
        
        // Physics & State
        let targetX = 0, currentX = 0, zoomTarget = 40;
        let lastTap = 0, speedMultiplier = 1.0;
        let currentSector = 'OVERWORLD';
        let timeOffset = 0; // For skipping events

        // --- Audio Routing ---
        async function initMic() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupAudioNodes();
                mediaSource = audioCtx.createMediaStreamSource(stream);
                mediaSource.connect(analyzer); 
                startGame();
            } catch (err) { alert("Mic denied. Use LOCAL MP3."); }
        }

        function initFileClick() { document.getElementById('audioUpload').click(); }
        document.getElementById('audioUpload').addEventListener('change', async function() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission();
            if (this.files.length === 0) return;
            audioElement.src = URL.createObjectURL(this.files[0]);
            audioElement.play();
            document.getElementById('audioControls').style.display = 'block';
            setupAudioNodes();
            if (!mediaSource) {
                mediaSource = audioCtx.createMediaElementSource(audioElement);
                mediaSource.connect(analyzer);
                analyzer.connect(audioCtx.destination);
            }
            startGame();
        });

        function setupAudioNodes() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function startGame() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
            if(!scene) setupScene();
        }

        // --- Construction ---
        function setupScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.008);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1500);
            camera.position.set(0, 10, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
            composer.addPass(bloomPass);

            sun = new THREE.DirectionalLight(0xffddaa, 1.5);
            sun.position.set(0, 100, -50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x002244, 0.6));

            buildEnvironment();
            buildObstacles();
            buildWeather();

            window.addEventListener('deviceorientation', (e) => { targetX = e.gamma * 0.8; document.getElementById('tilt').innerText = `STEER: ${Math.round(e.gamma)}°`; });
            window.addEventListener('wheel', (e) => { zoomTarget = Math.max(15, Math.min(80, zoomTarget + e.deltaY * 0.05)); });
            window.addEventListener('touchstart', (e) => { if(e.target.tagName !== 'BUTTON') handleDoubleTap(); });
            document.getElementById('shiftBtn').addEventListener('click', jumpSector);
            document.getElementById('skipBtn').addEventListener('click', () => timeOffset += 10 * 60000);
            
            animate();
        }

        function buildEnvironment() {
            grassField = new THREE.Mesh(new THREE.PlaneGeometry(400, 1000, 40, 40), new THREE.MeshStandardMaterial({ color: 0x113311, wireframe: true, transparent: true, opacity: 0.3 }));
            grassField.rotation.x = -Math.PI / 2;
            scene.add(grassField);

            // Distant City
            const cityGeo = new THREE.BufferGeometry();
            const cityPos = [];
            for(let i=0; i<100; i++) cityPos.push((Math.random()-0.5)*800, Math.random()*50, -800);
            cityGeo.setAttribute('position', new THREE.Float32BufferAttribute(cityPos, 3));
            distantCity = new THREE.Points(cityGeo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 8, transparent: true, opacity: 0.4 }));
            scene.add(distantCity);

            // Train Tracks (Offset Right)
            tracks = new THREE.Group();
            for(let i=0; i<20; i++) {
                const plank = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 2), new THREE.MeshStandardMaterial({ color: 0x332211 }));
                plank.position.set(40, 0.25, -i*50);
                tracks.add(plank);
            }
            scene.add(tracks);

            // Train Object
            trainGroup = new THREE.Group();
            const engine = new THREE.Mesh(new THREE.BoxGeometry(6, 10, 20), new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0x110000 }));
            engine.position.set(40, 5, 200);
            trainGroup.add(engine);
            scene.add(trainGroup);

            // Camo Balloon
            const camoCanvas = document.createElement('canvas'); camoCanvas.width = camoCanvas.height = 256;
            const ctx = camoCanvas.getContext('2d'); ctx.fillStyle = '#2d3e26'; ctx.fillRect(0,0,256,256);
            for(let i=0; i<100; i++) { ctx.fillStyle = ['#1a2416', '#4b5332', '#6b734d'][Math.floor(Math.random()*3)]; ctx.beginPath(); ctx.arc(Math.random()*256, Math.random()*256, 10+Math.random()*30, 0, Math.PI*2); ctx.fill(); }
            const camoTex = new THREE.CanvasTexture(camoCanvas); camoTex.wrapS = camoTex.wrapT = THREE.RepeatWrapping;

            balloonGroup = new THREE.Group();
            camoMat = new THREE.MeshStandardMaterial({ map: camoTex, roughness: 1 });
            const envelope = new THREE.Mesh(new THREE.IcosahedronGeometry(5, 3), camoMat); envelope.scale.set(1, 1.4, 1);
            balloonGroup.add(envelope);
            balloonGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), new THREE.MeshStandardMaterial({ color: 0xffaa00 })).translateY(-6.5));
            scene.add(balloonGroup);
        }

        function buildObstacles() {
            const rockGeo = new THREE.DodecahedronGeometry(3);
            const rockMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.9 });
            for(let i=0; i<25; i++) {
                const rock = new THREE.Mesh(rockGeo, rockMat);
                rock.position.set((Math.random()-0.5)*100, 1.5, -Math.random()*800);
                scene.add(rock);
                obstacles.push(rock);
            }

            const crowGeo = new THREE.ConeGeometry(0.5, 2, 4);
            const crowMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
            for(let i=0; i<5; i++) {
                const crow = new THREE.Mesh(crowGeo, crowMat);
                crow.rotation.x = Math.PI/2;
                crow.position.set(-60, 10 + Math.random()*10, -Math.random()*500);
                scene.add(crow);
                crows.push(crow);
            }
        }

        function buildWeather() {
            rain = createParticles(0xaaaaFF, 5000, 0.2);
            hail = createParticles(0xffffff, 3000, 0.8); // Bigger, white
            meteors = createParticles(0xff4400, 500, 1.5); // Orange
            scarabs = createParticles(0xffd700, 2000, 0.6); // Gold dots

            floodPlane = new THREE.Mesh(new THREE.PlaneGeometry(500, 1000), new THREE.MeshStandardMaterial({ color: 0x0055aa, transparent: true, opacity: 0.8 }));
            floodPlane.rotation.x = -Math.PI/2;
            floodPlane.position.y = -10; // Hidden initially
            scene.add(floodPlane);
        }

        function createParticles(color, count, size) {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<count; i++) pos.push((Math.random()-0.5)*300, Math.random()*150, (Math.random()-0.5)*400);
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color, size, transparent: true, opacity: 0 }));
            scene.add(pts);
            return pts;
        }

        function handleDoubleTap() {
            const now = Date.now();
            if (now - lastTap < 300) speedMultiplier = (speedMultiplier >= 5) ? 1.0 : speedMultiplier + 1.0;
            lastTap = now;
        }
        function jumpSector() {
            currentSector = (currentSector === 'OVERWORLD') ? 'ABYSSAL' : 'OVERWORLD';
            document.getElementById('sector').innerText = `SECTOR: ${currentSector}`;
            scene.fog.color.setHex(currentSector === 'ABYSSAL' ? 0x000205 : 0x00050a);
        }

        // --- Master 120-Minute Cycle Logic ---
        function runMasterCycle() {
            // Calculate where we are in a continuous 120-minute loop
            const elapsedMins = ((Date.now() + timeOffset) / 60000) % 120;
            let currentEvent = 'CLEAR';

            rain.material.opacity = 0; hail.material.opacity = 0;
            meteors.material.opacity = 0; scarabs.material.opacity = 0;
            sun.intensity = 1.0;

            if (elapsedMins < 10) { currentEvent = 'RAIN'; rain.material.opacity = 0.5; }
            else if (elapsedMins >= 20 && elapsedMins < 30) { currentEvent = 'HAIL'; hail.material.opacity = 1; }
            else if (elapsedMins >= 40 && elapsedMins < 50) { 
                currentEvent = 'STORM'; rain.material.opacity = 0.8; 
                if (Math.random() < 0.05) sun.intensity = 5; // Lightning flash
            }
            else if (elapsedMins >= 60 && elapsedMins < 70) {
                currentEvent = 'FLOOD';
                // Interpolate water level based on progress through the 10 mins
                let progress = elapsedMins - 60; 
                let targetY = progress < 5 ? -10 + (progress/5)*15 : 5 - ((progress-5)/5)*15;
                floodPlane.position.y += (targetY - floodPlane.position.y) * 0.05;
            }
            else if (elapsedMins >= 80 && elapsedMins < 90) { currentEvent = 'METEORS'; meteors.material.opacity = 1; }
            else if (elapsedMins >= 100 && elapsedMins < 110) { currentEvent = 'SCARABS'; scarabs.material.opacity = 1; }
            else { floodPlane.position.y += (-10 - floodPlane.position.y) * 0.1; } // Recede flood if off-cycle

            document.getElementById('eventDisplay').innerText = `EVENT: ${currentEvent} (${Math.floor(elapsedMins)}m/120m)`;
        }

        function animate() {
            requestAnimationFrame(animate);
            runMasterCycle();
            
            let bass = 0;
            if (analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                bass = dataArray[2] / 255;
            }

            // Steer & Zoom
            currentX += (targetX - currentX) * 0.1;
            balloonGroup.position.x = currentX;
            balloonGroup.rotation.z = -currentX * 0.05;
            camera.position.z += (zoomTarget - camera.position.z) * 0.1;

            const speed = (1 + bass * 3) * speedMultiplier;
            grassField.position.z += speed; if(grassField.position.z > 50) grassField.position.z = 0;

            // Train Logic (Runs every 2 minutes)
            const trainMins = ((Date.now() + timeOffset) / 60000) % 2;
            tracks.children.forEach(t => { t.position.z += speed; if(t.position.z > 50) t.position.z -= 1000; });
            if (trainMins < 0.2) trainGroup.children[0].position.z += speed * 3; // Moves forward rapidly
            else trainGroup.children[0].position.z = -800; // Reset way back

            // Distant City (Parallax)
            distantCity.position.z += speed * 0.05; if(distantCity.position.z > 500) distantCity.position.z = 0;

            // Obstacles & Collision
            obstacles.forEach(rock => {
                rock.position.z += speed;
                if(rock.position.z > 50) { rock.position.z = -800 - Math.random()*200; rock.position.x = (Math.random()-0.5)*100; }
                
                // Hit detection
                if (Math.abs(rock.position.z - balloonGroup.position.z) < 5 && Math.abs(rock.position.x - balloonGroup.position.x) < 4) {
                    document.getElementById('flash').style.opacity = '0.5';
                    setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
                }
            });

            // Crows
            crows.forEach((crow, i) => {
                crow.position.z += speed * 1.5;
                crow.position.x += 0.5; // Fly diagonally
                crow.position.y += Math.sin(Date.now()*0.01 + i) * 0.2; // Flap
                if(crow.position.z > 50 || crow.position.x > 80) { 
                    crow.position.set(-60 - Math.random()*20, 5 + Math.random()*15, -600 - Math.random()*200); 
                }
                if (Math.abs(crow.position.z - balloonGroup.position.z) < 4 && Math.abs(crow.position.x - balloonGroup.position.x) < 3) {
                    document.getElementById('flash').style.opacity = '0.5'; setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
                }
            });

            // Weather Particles
            const moveWeather = (mesh, drop, wrapY) => {
                if(mesh.material.opacity > 0) {
                    const pos = mesh.geometry.attributes.position.array;
                    for(let i=1; i<pos.length; i+=3) { 
                        pos[i] -= drop; 
                        if(mesh === meteors) pos[i-1] += drop; // meteors move diagonally X
                        if(pos[i] < 0) pos[i] = wrapY; 
                    }
                    mesh.geometry.attributes.position.needsUpdate = true;
                }
            };
            moveWeather(rain, 3 + bass, 150);
            moveWeather(hail, 4, 150);
            moveWeather(meteors, 6, 200);

            // Scarab Swirl
            if(scarabs.material.opacity > 0) {
                const pos = scarabs.geometry.attributes.position.array;
                for(let i=0; i<pos.length; i+=3) {
                    pos[i] += Math.sin(Date.now()*0.005 + i) * 0.5; // Swirl X
                    pos[i+1] += Math.cos(Date.now()*0.005 + i) * 0.5; // Swirl Y
                    pos[i+2] += speed; // Move with terrain
                    if(pos[i+2] > 50) pos[i+2] = -400;
                }
                scarabs.geometry.attributes.position.needsUpdate = true;
            }

            camoMat.emissive = new THREE.Color(0x00f2ff).multiplyScalar(bass * 0.5);
            bloomPass.strength = 1.0 + (bass * 2);

            composer.render();
        }

        document.getElementById('micBtn').addEventListener('click', initMic);
        document.getElementById('fileBtn').addEventListener('click', initFileClick);
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
