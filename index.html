<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vortex | Apex Survivor v2.6</title>
    <style>
        :root { --cyan: #00f2ff; --gold: #d4af37; --droid: #3DDC84; --glass: rgba(0, 10, 15, 0.9); }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #fff; user-select: none; }
        
        /* OVERLAY SYSTEM */
        #gate-overlay {
            position: absolute; inset: 0; z-index: 2000;
            background: radial-gradient(circle, #001a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 0.8s cubic-bezier(0.87, 0, 0.13, 1);
        }

        .terminal-box {
            background: var(--glass); border: 1px solid var(--cyan);
            padding: 40px; width: 350px; text-align: center;
            backdrop-filter: blur(20px); box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
        }

        h1 { font-weight: 200; letter-spacing: 10px; color: var(--cyan); margin: 0 0 10px; }
        .summit-tag { color: var(--gold); font-size: 10px; letter-spacing: 3px; margin-bottom: 30px; }

        input {
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: var(--cyan); padding: 12px; width: 100%; box-sizing: border-box;
            text-align: center; font-family: monospace; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--cyan); background: rgba(0, 242, 255, 0.05); }

        /* THE SPINE HUD */
        #spine-hud {
            position: absolute; right: 20px; top: 20px; bottom: 20px;
            width: 320px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }

        .hud-panel {
            background: var(--glass); border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 15px; pointer-events: auto; border-radius: 4px;
        }

        .app-btn {
            display: block; width: 100%; padding: 10px; margin-top: 5px;
            background: rgba(61, 220, 132, 0.1); border: 1px solid var(--droid);
            color: var(--droid); text-align: left; font-size: 10px;
            cursor: pointer; text-decoration: none;
        }
        .app-btn:hover { background: var(--droid); color: #000; }

        /* GAME UI */
        #game-stats { position: absolute; left: 20px; top: 20px; z-index: 1000; font-family: monospace; }
        .stat-bit { font-size: 18px; color: var(--cyan); text-shadow: 0 0 5px var(--cyan); }
        
        #yt-api-container { width: 100%; aspect-ratio: 16/9; background: #000; margin-bottom: 10px; border: 1px solid var(--gold); }
    </style>
</head>
<body>

    <div id="gate-overlay">
        <h1>NEXUS VOYAGE</h1>
        <div class="summit-tag">APEX_SURVIVOR // SUMMIT_2026_EDITION</div>
        <div class="terminal-box">
            <p style="font-size: 10px; opacity: 0.6;">ENCRYPTED ACCESS REQUIRED</p>
            <input type="password" id="passCode" placeholder="ENTER ACCESS KEY">
            <div id="setup-controls" style="display:none; margin-top:20px;">
                <button onclick="initGame('mic')" style="width:100%; padding:15px; background:var(--cyan); border:none; cursor:pointer; font-weight:bold;">INITIALIZE NEURAL LINK</button>
            </div>
        </div>
    </div>

    <div id="game-stats">
        <div class="stat-bit">LIVES: <span id="lives">100</span></div>
        <div class="stat-bit">DIST: <span id="dist">0</span>m</div>
    </div>

    <div id="spine-hud">
        <div class="hud-panel">
            <div id="yt-api-container">
                <iframe id="api-player" width="100%" height="100%" src="" frameborder="0" allow="autoplay"></iframe>
            </div>
            <div class="app-btn" style="border-color:var(--gold); color:var(--gold)" onclick="switchStream('KUlNNm6ZAgE')">SYNC: BATTY RAP</div>
            <div class="app-btn" style="border-color:var(--gold); color:var(--gold)" onclick="switchStream('B7X67B92rlo')">SYNC: TOXIC LOVE</div>
            <div class="app-btn" style="border-color:var(--gold); color:var(--gold)" onclick="switchStream('nGnX6GkrOgk')">SYNC: END OF HEXXUS</div>
        </div>

        <div class="hud-panel" style="overflow-y: auto;">
            <div style="font-size:9px; color:var(--droid); margin-bottom:10px;">HEALING_APP_MANIFEST</div>
            <a href="https://play.google.com/store/apps/details?id=com.betterhelp" target="_blank" class="app-btn">DEPLOY: BETTERHELP</a>
            <a href="https://play.google.com/store/apps/details?id=com.calm.android" target="_blank" class="app-btn">DEPLOY: CALM</a>
            <a href="https://play.google.com/store/apps/details?id=org.woebot" target="_blank" class="app-btn">DEPLOY: WOEBOT AI</a>
            <a href="https://play.google.com/store/apps/details?id=com.dayoneapp.dayone" target="_blank" class="app-btn">DEPLOY: DAY ONE</a>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, analyzer, dataArray;
        let balloon, obstacles = [], distance = 0, lives = 100;

        // OBVIOUS BUT HIDDEN PASSWORD CHECK
        const _v = (s) => btoa(s) === 'cmVlZg=='; 

        document.getElementById('passCode').addEventListener('input', (e) => {
            if(_v(e.target.value)) {
                document.getElementById('setup-controls').style.display = 'block';
                e.target.style.borderColor = '#3DDC84';
            }
        });

        window.initGame = async (type) => {
            document.getElementById('gate-overlay').style.transform = 'translateY(-100%)';
            setup3D();
            if(type === 'mic') {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const ctx = new AudioContext();
                const source = ctx.createMediaStreamSource(stream);
                analyzer = ctx.createAnalyser();
                source.connect(analyzer);
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
        };

        window.switchStream = (id) => {
            document.getElementById('api-player').src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=0`;
        };

        function setup3D() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000a0a, 0.005);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85));

            // Ship
            const geometry = new THREE.TetrahedronGeometry(1);
            const material = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff });
            balloon = new THREE.Mesh(geometry, material);
            scene.add(balloon);

            // Ground
            const ground = new THREE.GridHelper(200, 50, 0x00f2ff, 0x002222);
            ground.position.y = -2;
            scene.add(ground);

            scene.add(new THREE.AmbientLight(0x404040));
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            let volume = 0;
            if (analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                volume = dataArray[10] / 255;
            }

            distance += 0.1 + (volume * 0.5);
            document.getElementById('dist').innerText = Math.floor(distance);

            balloon.rotation.y += 0.01;
            balloon.position.y = Math.sin(Date.now() * 0.002) * 0.5;
            
            composer.render();
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
