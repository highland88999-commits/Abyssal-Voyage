<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Voyage: Living World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            background: rgba(0,0,0,0.9); color: #fff;
        }
        #ui {
            position: absolute; top: 20px; right: 20px; color: #fff; 
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
            pointer-events: none; text-align: right;
        }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #00f2ff; border: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>OMNI-VOYAGE</h1>
        <p>Double Tap to Boost Speed</p>
        <button id="startBtn">START ENGINE</button>
    </div>

    <div id="ui">
        <div id="clock">TIME: --:--</div>
        <div id="weather">WEATHER: CLEAR</div>
        <div id="speed">WARP: 1x</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, bloomPass, analyzer, dataArray;
        let starField, grassField, rainParticles, snowParticles, sun;
        let lastTap = 0, speedMultiplier = 1.0;
        let isNight = false, isRaining = false, isSnowing = false;

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);
            dataArray = new Uint8Array(analyzer.frequencyBinCount);

            document.getElementById('overlay').style.display = 'none';
            setupScene();
        }

        function setupScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 10, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.5, 0.4, 0.85);
            composer.addPass(bloomPass);

            // 1. STARFIELD (Above)
            const starGeo = new THREE.BufferGeometry();
            const starCoords = [];
            for(let i=0; i<2000; i++) {
                starCoords.push((Math.random()-0.5)*400, 50 + Math.random()*100, (Math.random()-0.5)*400);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
            starField = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
            scene.add(starField);

            // 2. GRASS (Below)
            const grassGeo = new THREE.PlaneGeometry(200, 400, 50, 50);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x113311, wireframe: true });
            grassField = new THREE.Mesh(grassGeo, grassMat);
            grassField.rotation.x = -Math.PI / 2;
            scene.add(grassField);

            // 3. SUN / DAYLIGHT
            sun = new THREE.DirectionalLight(0xffffcc, 1);
            sun.position.set(0, 100, -50);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));

            // 4. WEATHER SYSTEMS
            rainParticles = createParticles(0xaaaaFF, 5000, 0.2);
            snowParticles = createParticles(0xffffff, 8000, 0.4);

            window.addEventListener('touchstart', handleDoubleTap);
            window.addEventListener('mousedown', handleDoubleTap);
            
            animate();
        }

        function createParticles(color, count, size) {
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<count; i++) pos.push((Math.random()-0.5)*200, Math.random()*100, (Math.random()-0.5)*200);
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const points = new THREE.Points(geo, new THREE.PointsMaterial({ color, size, transparent: true, opacity: 0 }));
            scene.add(points);
            return points;
        }

        function handleDoubleTap(e) {
            const now = Date.now();
            if (now - lastTap < 300) {
                speedMultiplier = (speedMultiplier >= 5) ? 1.0 : speedMultiplier + 1.0;
                document.getElementById('speed').innerText = `WARP: ${speedMultiplier}x`;
            }
            lastTap = now;
        }

        function updateEnvironment() {
            const now = new Date();
            const mins = now.getMinutes();
            const hours = now.getHours();
            const month = now.getMonth(); // 0-11
            const date = now.getDate();

            // Day/Night Logic (Night: 8pm - 6am)
            isNight = (hours >= 20 || hours < 6);
            scene.background = new THREE.Color(isNight ? 0x000000 : 0x87CEEB);
            sun.intensity = isNight ? 0 : 1;
            starField.material.opacity = isNight ? 1 : 0;

            // Rain Logic (Once an hour for 10 mins)
            isRaining = (mins >= 0 && mins < 10);
            rainParticles.material.opacity = isRaining ? 0.6 : 0;

            // Snow Logic (Every 4 months for 2 weeks)
            // Example: Months 0 (Jan), 4 (May), 8 (Sept)
            isSnowing = (month % 4 === 0 && date <= 14);
            snowParticles.material.opacity = isSnowing ? 1 : 0;

            document.getElementById('weather').innerText = `WEATHER: ${isSnowing ? 'SNOW' : (isRaining ? 'RAIN' : 'CLEAR')}`;
            document.getElementById('clock').innerText = `TIME: ${hours.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            updateEnvironment();
            
            if (analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                const bass = dataArray[2] / 255;
                const scrollSpeed = (1.0 + (bass * 2)) * speedMultiplier;

                // Move environment
                grassField.position.z += scrollSpeed;
                if(grassField.position.z > 100) grassField.position.z = 0;

                if(isRaining) {
                    const rainPos = rainParticles.geometry.attributes.position.array;
                    for(let i=1; i<rainPos.length; i+=3) {
                        rainPos[i] -= 2;
                        if(rainPos[i] < 0) rainPos[i] = 100;
                    }
                    rainParticles.geometry.attributes.position.needsUpdate = true;
                }

                if(isSnowing) {
                    const snowPos = snowParticles.geometry.attributes.position.array;
                    for(let i=1; i<snowPos.length; i+=3) {
                        snowPos[i] -= 0.5;
                        if(snowPos[i] < 0) snowPos[i] = 100;
                    }
                    snowParticles.geometry.attributes.position.needsUpdate = true;
                }
            }

            composer.render();
        }

        document.getElementById('startBtn').addEventListener('click', init);
    </script>
</body>
</html>
