<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Vortex: Apex Survivor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; gap: 15px;
            background: rgba(0,0,0,0.95); color: #fff; transition: opacity 0.5s;
        }
        h1 { letter-spacing: 5px; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; text-align: center; margin-bottom: 0;}
        #access-gate { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .payment-links { display: flex; gap: 10px; margin-top: 10px; }
        .pay-btn { background: #ffaa00 !important; color: #000 !important; border-color: #ffaa00 !important; text-decoration: none; padding: 10px 20px; font-weight: bold; font-size: 14px; border: 1px solid transparent; }
        #passField { background: #000; border: 1px solid #333; color: #333; text-align: center; padding: 10px; margin-top: 10px; outline: none; }
        #game-setup { display: none; flex-direction: column; align-items: center; gap: 15px; }
        #usernameInput { padding: 10px; font-size: 18px; background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1px solid #00f2ff; text-align: center; width: 250px; outline: none; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: rgba(0, 242, 255, 0.1); color: #00f2ff; border: 1px solid #00f2ff; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00f2ff; color: #000; }
        #ui-panel { position: absolute; top: 20px; right: 20px; color: #00f2ff; background: rgba(0,10,20,0.8); padding: 15px; border: 1px solid #00f2ff; border-radius: 8px; pointer-events: none; text-align: right; z-index: 100; }
        #controls { position: absolute; bottom: 20px; left: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
        .hit-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; z-index: 500; }
    </style>
</head>
<body>

    <div class="hit-flash" id="flash"></div>
    <div id="yt-player"></div>

    <div id="overlay">
        <h1>NEXUS VOYAGE</h1>
        <span style="font-size: 1.2em; color: #ffaa00; letter-spacing: 3px; margin-bottom: 10px;">APEX SURVIVOR</span>
        
        <div id="access-gate">
            <div style="text-align: center; border: 1px solid #444; padding: 20px;">
                <p style="margin-top:0;">ACCESS RESTRICTED: CONTRIBUTION REQUIRED</p>
                <div class="payment-links">
                    <a href="#" class="pay-btn">CRYPTO PAY</a>
                    <a href="#" class="pay-btn">STRIPE PAY</a>
                </div>
                <input type="password" id="passField" placeholder="DEVELOPER KEY (try 'reef')">
            </div>
        </div>

        <div id="game-setup">
            <input type="text" id="usernameInput" placeholder="ENTER CALL-SIGN" maxlength="12">
            <div class="btn-group">
                <button id="micBtn">INIT: MIC</button>
                <button id="fileBtn">INIT: LOCAL MP3</button>
            </div>
            <input type="file" id="audioUpload" accept="audio/*" style="display: none;">
        </div>
    </div>

    <div id="ui-panel">
        <div id="livesStat" style="color: #ff0055; font-weight: bold;">LIVES: 100</div>
        <div id="distStat" style="color: #00ff88;">DIST: 0m</div>
        <div id="eventDisplay" style="color: #ffaa00;">EVENT: CLEAR</div>
    </div>

    <div id="controls">
        <button id="skipBtn" style="background: #ff00ff; color: #000; border-color: #ff00ff;">>> FF EVENT</button>
        <audio id="audioPlayer" style="display:none"></audio>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, bloomPass;
        let audioCtx, analyzer, dataArray, mediaSource;
        const audioElement = document.getElementById('audioPlayer');
        
        // Game State
        let lives = 100, distance = 0, isGameOver = false, isInvulnerable = false;
        let currentX = 0, targetX = 0, timeOffset = 0, skipHistory = [];
        
        // Objects
        let balloonGroup, grassField, floodPlane, waveMesh;
        let obstacles = [], crows = [], floatingRocks = [];
        let rain, hail, meteors, scarabs, camoMat;

        // --- Gate Logic ---
        document.getElementById('passField').addEventListener('input', (e) => {
            if(e.target.value.toLowerCase() === 'reef') {
                document.getElementById('access-gate').style.display = 'none';
                document.getElementById('game-setup').style.display = 'flex';
            }
        });

        // --- Audio Setup ---
        async function setupAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyzer = audioCtx.createAnalyser();
                analyzer.fftSize = 256;
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();
        }

        document.getElementById('fileBtn').addEventListener('click', () => document.getElementById('audioUpload').click());
        document.getElementById('audioUpload').addEventListener('change', async function() {
            await setupAudio();
            const url = URL.createObjectURL(this.files[0]);
            audioElement.src = url;
            if (!mediaSource) {
                mediaSource = audioCtx.createMediaElementSource(audioElement);
                mediaSource.connect(analyzer);
                analyzer.connect(audioCtx.destination);
            }
            audioElement.play();
            startGame();
        });

        document.getElementById('micBtn').addEventListener('click', async () => {
            await setupAudio();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyzer);
            startGame();
        });

        // --- Core Engine ---
        function startGame() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
            initScene();
        }

        function initScene() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.008);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1500);
            camera.position.set(0, 10, 40);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
            composer.addPass(bloomPass);

            buildEnvironment();
            window.addEventListener('pointermove', (e) => {
                targetX = (e.clientX / window.innerWidth - 0.5) * 60;
            });
            animate();
        }

        function buildEnvironment() {
            // Ground
            const gGeo = new THREE.PlaneGeometry(1000, 1000, 50, 50);
            const gMat = new THREE.MeshStandardMaterial({ color: 0x050505, wireframe: true });
            grassField = new THREE.Mesh(gGeo, gMat);
            grassField.rotation.x = -Math.PI/2;
            scene.add(grassField);

            // Balloon/Ship
            balloonGroup = new THREE.Group();
            const shipGeo = new THREE.ConeGeometry(2, 5, 4);
            camoMat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, emissive: 0x00f2ff });
            const ship = new THREE.Mesh(shipGeo, camoMat);
            ship.rotation.x = Math.PI;
            balloonGroup.add(ship);
            scene.add(balloonGroup);

            // Lighting
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 50, 10);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040));

            // Obstacles
            for(let i=0; i<20; i++) {
                const oGeo = new THREE.BoxGeometry(4, 8, 4);
                const oMat = new THREE.MeshStandardMaterial({ color: 0xff0055 });
                const obs = new THREE.Mesh(oGeo, oMat);
                obs.position.set((Math.random()-0.5)*100, 4, -Math.random()*800);
                obstacles.push(obs);
                scene.add(obs);
            }

            // Weather (Placeholders)
            const pGeo = new THREE.BufferGeometry();
            const pMat = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff, transparent: true, opacity: 0 });
            rain = new THREE.Points(pGeo, pMat); 
            scene.add(rain);
            
            // Required for logic later
            floodPlane = new THREE.Mesh(new THREE.PlaneGeometry(500,500), new THREE.MeshStandardMaterial({color: 0x0055ff, transparent:true, opacity:0.5}));
            floodPlane.rotation.x = -Math.PI/2;
            floodPlane.position.y = -10;
            scene.add(floodPlane);
            
            const wGeo = new THREE.BoxGeometry(200, 10, 10);
            waveMesh = new THREE.Mesh(wGeo, new THREE.MeshStandardMaterial({color: 0xffffff}));
            waveMesh.visible = false;
            scene.add(waveMesh);
        }

        function takeDamage() {
            if (isInvulnerable || isGameOver) return;
            lives -= 1;
            document.getElementById('livesStat').innerText = `LIVES: ${lives}`;
            document.getElementById('flash').style.opacity = '0.5';
            setTimeout(() => document.getElementById('flash').style.opacity = '0', 100);
            
            isInvulnerable = true;
            setTimeout(() => isInvulnerable = false, 1000);
            
            if (lives <= 0) {
                isGameOver = true;
                alert("NEXUS COLLAPSED. DISTANCE: " + Math.floor(distance) + "m");
                location.reload();
            }
        }

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            
            let bass = 0;
            if (analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                bass = dataArray[2] / 255;
            }

            const speed = 1.5 + (bass * 4);
            distance += speed * 0.1;
            document.getElementById('distStat').innerText = `DIST: ${Math.floor(distance)}m`;

            // Movement
            currentX += (targetX - currentX) * 0.1;
            balloonGroup.position.x = currentX;
            balloonGroup.rotation.z = -currentX * 0.05;

            // Obstacle Movement & Collision
            obstacles.forEach(rock => {
                rock.position.z += speed;
                if(rock.position.z > 50) {
                    rock.position.z = -800;
                    rock.position.x = (Math.random()-0.5)*100;
                }
                
                const dx = rock.position.x - balloonGroup.position.x;
                const dz = rock.position.z - balloonGroup.position.z;
                if (Math.abs(dz) < 4 && Math.abs(dx) < 3) takeDamage();
            });

            // Visuals
            camoMat.emissiveIntensity = bass * 2;
            bloomPass.strength = 1.0 + (bass * 1.5);
            
            composer.render();
        }

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
