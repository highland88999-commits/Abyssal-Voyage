<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Voyage: Abyssal Aquarium</title>
    <style>
        body { margin: 0; overflow: hidden; background: #00050a; font-family: 'Courier New', monospace; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            background: rgba(0,5,10,0.95); transition: opacity 0.5s ease;
        }
        #startBtn { 
            padding: 20px 50px; font-size: 24px; cursor: pointer; 
            background: transparent; color: #00f2ff; border: 2px solid #00f2ff;
            text-transform: uppercase; font-weight: bold; box-shadow: 0 0 20px #00f2ff;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px; z-index: 10;
            color: #00f2ff; background: rgba(0,10,20,0.7); padding: 15px; border: 1px solid #00f2ff;
            border-radius: 8px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #00f2ff; letter-spacing: 5px;">ABYSSAL AQUARIUM</h1>
        <button id="startBtn">ENGAGE VOYAGE</button>
    </div>

    <div id="controls">
        SECTOR: <span id="dimLabel">GLASS CANYON</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/examples/jsm/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/examples/jsm/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/examples/jsm/postprocessing/UnrealBloomPass.js';

        let scene, camera, renderer, composer, bloomPass;
        let analyzer, dataArray;
        let glassWalls = [], seaLife = [];
        let balloonGroup, hoodieMat;

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new AudioContext();
            const source = audioCtx.createMediaStreamSource(stream);
            analyzer = audioCtx.createAnalyser();
            analyzer.fftSize = 256;
            source.connect(analyzer);
            dataArray = new Uint8Array(analyzer.frequencyBinCount);

            document.getElementById('overlay').style.display = 'none';

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x00050a, 0.012);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 35);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer);
            composer.addPass(new RenderPass(scene, camera));
            bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            composer.addPass(bloomPass);

            // Lighting (Blueish Undersea Tint)
            const waterLight = new THREE.PointLight(0x00f2ff, 2, 100);
            waterLight.position.set(0, 15, 10);
            scene.add(waterLight);
            scene.add(new THREE.AmbientLight(0x001122, 0.4));

            // --- Glass Walls & Sea Life ---
            const tankGeo = new THREE.BoxGeometry(10, 80, 100); 
            const glassMat = new THREE.MeshStandardMaterial({ 
                color: 0x00ffff, 
                metalness: 0.9, 
                roughness: 0.05, 
                transparent: true, 
                opacity: 0.2, 
                side: THREE.DoubleSide 
            });

            for (let i = 0; i < 4; i++) {
                // Left Tank
                let leftTank = new THREE.Mesh(tankGeo, glassMat);
                leftTank.position.set(-40, 20, -i * 100);
                scene.add(leftTank);

                // Right Tank
                let rightTank = new THREE.Mesh(tankGeo, glassMat);
                rightTank.position.set(40, 20, -i * 100);
                scene.add(rightTank);

                glassWalls.push(leftTank, rightTank);

                // Add fish inside these specific tanks
                spawnFishInTank(leftTank.position);
                spawnFishInTank(rightTank.position);
            }

            // --- The Captain ---
            balloonGroup = new THREE.Group();
            const neonMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, wireframe: true });
            const env = new THREE.Mesh(new THREE.IcosahedronGeometry(5, 2), neonMat);
            env.scale.set(1, 1.4, 1);
            balloonGroup.add(env);

            hoodieMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 2 });
            const cap = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.2, 0.4), hoodieMat);
            cap.position.y = -6.5;
            balloonGroup.add(cap);
            scene.add(balloonGroup);

            animate();
        }

        function spawnFishInTank(tankPos) {
            for (let i = 0; i < 8; i++) {
                const fishGeo = new THREE.ConeGeometry(0.4, 1.2, 4);
                const fishMat = new THREE.MeshBasicMaterial({ 
                    color: new THREE.Color().setHSL(Math.random(), 1, 0.5) 
                });
                const fish = new THREE.Mesh(fishGeo, fishMat);
                
                // Random position within the tank volume
                fish.position.set(
                    tankPos.x + (Math.random() - 0.5) * 5,
                    tankPos.y + (Math.random() - 0.5) * 30,
                    tankPos.z + (Math.random() - 0.5) * 80
                );
                fish.rotation.x = Math.PI / 2;
                fish.userData = { 
                    speed: 0.1 + Math.random() * 0.2,
                    offset: Math.random() * Math.PI * 2 
                };
                
                scene.add(fish);
                seaLife.push(fish);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            analyzer.getByteFrequencyData(dataArray);
            const bass = dataArray[2] / 255;

            // 1. Scroll Walls (The Aquarium Conveyor)
            glassWalls.forEach(tank => {
                tank.position.z += 1.0;
                if (tank.position.z > 80) tank.position.z = -320;
            });

            // 2. Animate Sea Life
            seaLife.forEach(fish => {
                // Move fish forward with the "water"
                fish.position.z += 1.0; 
                // Local swimming motion
                fish.position.y += Math.sin(Date.now() * 0.002 + fish.userData.offset) * 0.05;
                
                // Bass reaction: fish dart faster
                fish.position.z += (bass * 2);

                if (fish.position.z > 80) fish.position.z = -320;
            });

            // 3. Reactivity
            bloomPass.strength = 1.0 + (bass * 3);
            hoodieMat.emissiveIntensity = 2 + (bass * 10);
            balloonGroup.position.y = 6 + Math.sin(Date.now() * 0.002) * 1.2;

            composer.render();
        }

        document.getElementById('startBtn').addEventListener('click', init);
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
